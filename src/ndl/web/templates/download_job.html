{% extends "base.html" %}

{% block title %}Download - NDL{% endblock %}

{% block content %}
  <section class="job-panel" aria-label="Download job" data-event-source="/downloads/{{ job.id }}/events">
    <p class="eyebrow">Download Job</p>
    <h2>{{ job.url }}</h2>
    <dl class="job-details">
      <div>
        <dt>Status</dt>
        <dd data-job-status>{{ job.status }}</dd>
      </div>
      <div>
        <dt>Format</dt>
        <dd>{{ job.target_format }}</dd>
      </div>
      <div>
        <dt>Save</dt>
        <dd>{{ "yes" if job.save else "no" }}</dd>
      </div>
    </dl>
    <ol class="progress-log" data-progress-log></ol>
    <a class="text-link" href="/">Library</a>
  </section>
{% endblock %}
