{% extends "base.html" %}

{% block title %}Download - NDL{% endblock %}

{% block content %}
  <section class="job-panel" aria-label="Download job" data-event-source="/downloads/{{ job.id }}/events">
    <p class="eyebrow">Download Job</p>
    <h2>{{ job.url }}</h2>
    <dl class="job-details">
      <div>
        <dt>Status</dt>
        <dd data-job-status>{{ job.status }}</dd>
      </div>
      <div>
        <dt>Format</dt>
        <dd>{{ job.target_format }}</dd>
      </div>
      <div>
        <dt>Save</dt>
        <dd>{{ "yes" if job.save else "no" }}</dd>
      </div>
    </dl>
    <ol class="progress-log" data-progress-log></ol>
    <div class="job-result" data-job-result hidden>
      <p class="eyebrow" data-result-label></p>
      <p data-result-message></p>
      <p data-result-output hidden>
        Output: <code data-result-output-path></code>
      </p>
      <p data-result-library hidden>
        Saved to library:
        <a class="text-link" data-result-library-link href="#"></a>
      </p>
    </div>
    <a class="text-link" href="/">Library</a>
  </section>
{% endblock %}
